<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#f7f6f3"/>
<title>Beyondworks · Offline</title>
<style>
  :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Pretendard", sans-serif; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: radial-gradient(1200px 700px at 50% 0%, #F1EEE7 0%, #E8E3D8 55%, #DDD6C7 100%);
    color: #27241f;
  }
  main {
    width: min(320px, calc(100vw - 48px));
    padding: 24px;
    border-radius: 20px;
    background: rgba(255,255,255,.76);
    box-shadow: 0 16px 44px rgba(54,47,35,.16);
    backdrop-filter: blur(18px);
  }
  h1 { margin: 0 0 8px; font-size: 22px; line-height: 1.2; }
  p { margin: 0; color: rgba(39,36,31,.64); font-size: 14px; line-height: 1.55; }
  a {
    display: inline-flex;
    margin-top: 18px;
    color: #27241f;
    font-weight: 700;
    text-decoration: none;
  }
</style>
</head>
<body>
<main>
  <h1>오프라인 상태입니다</h1>
  <p>앱 화면은 다시 열 수 있지만 Notion 동기화는 네트워크 연결이 필요합니다.</p>
  <a href="/app">다시 시도</a>
</main>
</body>
</html>
