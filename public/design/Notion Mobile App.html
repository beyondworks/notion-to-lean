<script>
  (function nmApplyInitialTheme() {
    const dark = localStorage.getItem("nm-dark") === "1";
    const themeColor = dark ? "#0E0E0E" : "#F1EEE7";
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    document.documentElement.style.colorScheme = dark ? "dark" : "light";
    ["meta-theme-color", "meta-theme-color-light", "meta-theme-color-dark"].forEach((id) => {
      const meta = document.getElementById(id);
      if (meta) meta.setAttribute("content", themeColor);
    });
  })();

  // Keep localStorage-backed custom DB layout on the canonical dev origin.
  // localhost and 127.0.0.1 have separate storage, so 127 shows a fresh layout.
  if (location.hostname === "127.0.0.1") {
    location.replace(location.href.replace("//127.0.0.1", "//localhost"));
  }

  function nmSyncViewportMetrics() {
    const vv = window.visualViewport;
    const offsetTop = vv ? vv.offsetTop : 0;
    const visualHeight = vv ? vv.height : window.innerHeight;
    const isMobile = window.matchMedia("(max-width: 500px)").matches;
    const isStandalone = Boolean(window.navigator.standalone) || window.matchMedia("(display-mode: standalone)").matches;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    const layoutHeight = Math.max(
      window.innerHeight || 0,
      document.documentElement.clientHeight || 0
    );
    const keyboard = Math.max(0, layoutHeight - visualHeight - offsetTop);
    const viewportHeight = Math.max(320, visualHeight + offsetTop || layoutHeight);
    const fullViewport = isMobile ? "100lvh" : "100dvh";
    const height = keyboard > 80 ? `${Math.max(320, visualHeight)}px` : fullViewport;
    document.documentElement.style.setProperty("--nm-app-height", height);
    document.documentElement.style.setProperty("--nm-keyboard-bottom", `${keyboard}px`);
    document.documentElement.style.setProperty("--nm-safe-t-fallback", isMobile && isStandalone && isIOS ? "44px" : "0px");
    document.documentElement.style.setProperty("--nm-safe-b-fallback", isMobile && isStandalone && isIOS ? "34px" : "0px");
    document.documentElement.toggleAttribute("data-standalone-pwa", isMobile && isStandalone);
    document.documentElement.toggleAttribute("data-keyboard-open", keyboard > 80);
    window.nmRenderViewportDebug?.();
  }

  function nmViewportSnapshot() {
    const vv = window.visualViewport;
    const tab = document.querySelector(".tabbar")?.getBoundingClientRect();
    const phone = document.querySelector(".phone")?.getBoundingClientRect();
    const rootStyle = getComputedStyle(document.documentElement);
    return {
      href: location.href,
      standalone: Boolean(window.navigator.standalone) || window.matchMedia("(display-mode: standalone)").matches,
      dpr: window.devicePixelRatio,
      inner: [window.innerWidth, window.innerHeight],
      client: [document.documentElement.clientWidth, document.documentElement.clientHeight],
      visual: vv ? [Math.round(vv.width), Math.round(vv.height), Math.round(vv.offsetTop)] : null,
      screen: [window.screen.width, window.screen.height],
      appHeight: rootStyle.getPropertyValue("--nm-app-height").trim(),
      safeTop: rootStyle.getPropertyValue("--safe-t").trim(),
      safeBottom: rootStyle.getPropertyValue("--safe-b").trim(),
      keyboard: rootStyle.getPropertyValue("--nm-keyboard-bottom").trim(),
      phone: phone ? [Math.round(phone.top), Math.round(phone.bottom), Math.round(phone.height)] : null,
      tabbar: tab ? [Math.round(tab.top), Math.round(tab.bottom), Math.round(tab.height)] : null,
    };
  }

  window.nmRenderViewportDebug = function nmRenderViewportDebug() {
    const shouldShow = new URLSearchParams(location.search).has("debugViewport") || localStorage.getItem("nm-debug-viewport") === "1";
    if (!shouldShow) {
      document.getElementById("nm-vp-debug")?.remove();
      return;
    }
    let panel = document.getElementById("nm-vp-debug");
    if (!panel) {
      panel = document.createElement("pre");
      panel.id = "nm-vp-debug";
      panel.style.cssText = [
        "position:fixed",
        "left:8px",
        "right:8px",
        "bottom:8px",
        "z-index:99999",
        "max-height:42vh",
        "overflow:auto",
        "margin:0",
        "padding:10px",
        "border-radius:12px",
        "background:rgba(0,0,0,.82)",
        "color:#fff",
        "font:11px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace",
        "white-space:pre-wrap",
        "box-shadow:0 8px 30px rgba(0,0,0,.28)",
      ].join(";");
      document.addEventListener("DOMContentLoaded", () => document.body.appendChild(panel), { once: true });
      if (document.body) document.body.appendChild(panel);
    }
    panel.textContent = JSON.stringify(nmViewportSnapshot(), null, 2);
  };
  (function nmInstallViewportDebugGesture() {
    let taps = 0;
    let timer = 0;
    window.addEventListener("pointerup", (event) => {
      if (event.clientX > 116 || event.clientY > 116) return;
      window.clearTimeout(timer);
      taps += 1;
      if (taps >= 5) {
        taps = 0;
        const enabled = localStorage.getItem("nm-debug-viewport") === "1";
        localStorage.setItem("nm-debug-viewport", enabled ? "0" : "1");
        window.nmRenderViewportDebug?.();
        return;
      }
      timer = window.setTimeout(() => { taps = 0; }, 1600);
    }, { passive: true });
  })();
  nmSyncViewportMetrics();
  window.addEventListener("resize", nmSyncViewportMetrics, { passive: true });
  window.addEventListener("orientationchange", nmSyncViewportMetrics, { passive: true });
  window.visualViewport?.addEventListener("resize", nmSyncViewportMetrics, { passive: true });
  window.visualViewport?.addEventListener("scroll", nmSyncViewportMetrics, { passive: true });
  window.addEventListener("focusin", (event) => {
    const target = event.target;
    if (!target || !["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName)) return;
    window.setTimeout(() => {
      target.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });
    }, 260);
  }, { passive: true });
</script>

  .screen-picker {

  }

  .screen-picker::-webkit-scrollbar { display: none; }
  .screen-btn {
    border: none; background: transparent; color: var(--n-text-muted);

    transition: all var(--d-fast);

  .screen-btn.on { background: var(--n-accent); color: var(--n-bg); }

  @keyframes nm-shimmer {
    0% { background-position: 160% 0; }
    100% { background-position: -60% 0; }
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 80px; z-index: 100;
    width: 280px;
    background: var(--n-surface);

  .tweaks-panel.show { display: block; }
  .tweaks-panel h4 { margin: 0 0 10px; font-size: 13px; font-weight: 600; color: var(--n-text-strong); }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; gap: 8px; }

  /* ── Mobile: strip desktop-preview chrome ────────────── */
  @media (max-width: 500px) {
    html, body { position: fixed; inset: 0; width: 100dvw; height: 100lvh; min-height: 100lvh; background: var(--n-bg-grouped); overflow: hidden; overscroll-behavior: none; }
    [data-theme="dark"] html, [data-theme="dark"] body { background: var(--n-bg-grouped); }
    .stage { position: fixed; inset: 0; padding: 0; gap: 0; height: auto; min-height: 0; width: 100dvw; min-width: 100dvw; align-items: stretch; justify-content: flex-start; background: var(--n-bg-grouped); overflow: hidden; }

    #phone-root { position: fixed; inset: 0; width: 100dvw; height: auto; min-height: 0; background: var(--n-bg-grouped); overflow: hidden; }

<script type="text/babel">
const SCREENS = [
  { k: "home",         label: "홈" },
  { k: "calendar",     label: "캘린더" },
  { k: "db-list",      label: "DB · 태스크" },
  { k: "page",         label: "페이지" },
  { k: "event-edit",   label: "일정 등록" },
  { k: "search",       label: "검색" },
  { k: "onboarding",   label: "온보딩" },
  { k: "token",        label: "API 연결" },
  { k: "db-picker",    label: "DB 선택" },
  { k: "inbox",        label: "인박스" },
  { k: "settings",     label: "설정" },
  { k: "profile",      label: "프로필" },
];

function App() {
  const [screen, setScreen] = React.useState(() => {
    const onboarded = localStorage.getItem("nm-onboarded") === "1";
    const hasConnection = !!localStorage.getItem("nm-connection-mode");
    if (!onboarded && !hasConnection) return "onboarding";
    return localStorage.getItem("nm-screen") || "home";
  });
  const [ctx, setCtx] = React.useState({});
  const [history, setHistory] = React.useState([]); // stack of {screen, ctx}
  const [dark, setDark] = React.useState(() => localStorage.getItem("nm-dark") === "1");

  React.useEffect(() => { localStorage.setItem("nm-screen", screen); }, [screen]);

  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const oauthConnected = params.get("notion") === "connected";
    const oauthError = params.get("oauth_error");
    if (oauthError && window.nmToast) window.nmToast(`Notion 연결 실패: ${oauthError}`);
    window.nmRefreshSession?.().then((session) => {
      if (session?.connected && oauthConnected) {
        setScreen("db-picker");
        window.history.replaceState({}, "", "/app");
      } else if (oauthError) {
        setScreen("token");
        window.history.replaceState({}, "", "/app");
      }
    });
  }, []);

  // Apply stored UI prefs on mount
  React.useEffect(() => {
    const fs = localStorage.getItem("nm-font-size");
    if (fs && fs !== "기본") document.documentElement.setAttribute("data-font-size", fs);
    const lang = localStorage.getItem("nm-lang") || "한국어";
    document.documentElement.setAttribute("lang", lang === "English" ? "en" : "ko");
  }, []);
  React.useEffect(() => {
    localStorage.setItem("nm-dark", dark ? "1" : "0");
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    document.documentElement.style.colorScheme = dark ? "dark" : "light";
    // Sync status-bar / browser chrome color to the active theme so the
    // notch / safe-area reads as dark in dark mode and beige in light mode.
    const color = dark ? "#0E0E0E" : "#F1EEE7";
    const meta = document.getElementById("meta-theme-color");
    if (meta) meta.setAttribute("content", color);
    // Some browsers read the prefers-color-scheme-scoped variants — update both
    // so whichever one is active reflects the user's explicit choice.
    const mLight = document.getElementById("meta-theme-color-light");
    const mDark = document.getElementById("meta-theme-color-dark");
    if (mLight) mLight.setAttribute("content", dark ? "#0E0E0E" : "#F1EEE7");
    if (mDark) mDark.setAttribute("content", dark ? "#0E0E0E" : "#F1EEE7");
    const btn = document.getElementById("theme-btn");
    if (btn) btn.textContent = dark ? "☀ 라이트" : "🌙 다크";
    const cb = document.getElementById("tw-dark");
    if (cb) cb.checked = dark;
  }, [dark]);

  React.useEffect(() => {
    document.getElementById("screen-name").textContent = SCREENS.find(s => s.k === screen)?.label || screen;
    // Paint screen picker
    const pick = document.getElementById("screen-picker");
    pick.innerHTML = "";
    SCREENS.forEach(s => {
      const b = document.createElement("button");
      b.className = "screen-btn" + (s.k === screen ? " on" : "");
      b.textContent = s.label;
      b.onclick = () => setScreen(s.k);
      pick.appendChild(b);
    });
  }, [screen]);

  // Wire theme button
  React.useEffect(() => {
    const btn = document.getElementById("theme-btn");
    const handler = () => setDark(d => !d);
    btn?.addEventListener("click", handler);
    const cb = document.getElementById("tw-dark");
    const cbh = e => setDark(e.target.checked);
    cb?.addEventListener("change", cbh);
    return () => { btn?.removeEventListener("click", handler); cb?.removeEventListener("change", cbh); };
  }, []);

  const go = (k, nextCtx = {}) => {
    // push current onto history before navigating
    setHistory(h => [...h, {screen, ctx}].slice(-20)); // cap at 20
    setCtx(nextCtx || {});
    setScreen(k);
  };
  // Expose for tests / debugging
  React.useEffect(() => { window.__nmGo = go; }, [screen, ctx]);

  const goBack = () => {
    setHistory(h => {
      if (h.length === 0) {
        // No history → go home
        setCtx({});
        setScreen("home");
        return h;
      }
      const prev = h[h.length - 1];
      setCtx(prev.ctx || {});
      setScreen(prev.screen);
      return h.slice(0, -1);
    });
  };

  let body;
  switch (screen) {
    case "onboarding": body = <OnboardingScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "token":      body = <TokenScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "db-picker":  body = <DbPickerScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "home":       body = <HomeScreen go={go} goBack={goBack} ctx={ctx} dark={dark} setDark={setDark}/>; break;
    case "search":     body = <SearchScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "db-list":    body = <DbListScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "calendar":   body = <CalendarScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "page":       body = <PageScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "event-edit": body = <EventEditScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "inbox":      body = <InboxScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    case "settings":   body = <SettingsScreen go={go} goBack={goBack} ctx={ctx} dark={dark} setDark={setDark}/>; break;
    case "profile":    body = <ProfileScreen go={go} goBack={goBack} ctx={ctx}/>; break;
    default:           body = <HomeScreen go={go} goBack={goBack} ctx={ctx}/>;
  }
  return <Phone>{body}</Phone>;
}

ReactDOM.createRoot(document.getElementById("phone-root")).render(<App/>);
</script>

<script>
if ("serviceWorker" in navigator && location.protocol !== "file:") {
  let swReloading = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (swReloading) return;
    swReloading = true;
    window.location.reload();
  });
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then((registration) => {
        const activate = (worker) => worker && worker.postMessage({ type: "SKIP_WAITING" });
        if (registration.waiting) activate(registration.waiting);
        registration.addEventListener("updatefound", () => {
          const worker = registration.installing;
          worker?.addEventListener("statechange", () => {
            if (worker.state === "installed" && navigator.serviceWorker.controller) activate(worker);
          });
        });
      })
      .catch((err) => {
        console.warn("Service worker registration failed", err);
      });
  });
}

// Edit Mode protocol — Tweaks
(function() {
  const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
    "dark": false,
    "showBgGradient": true,
    "showFrame": true
  }/*EDITMODE-END*/;

  const panel = document.getElementById("tweaks-panel");
  window.addEventListener("message", (e) => {
    if (!e.data || typeof e.data !== "object") return;
    if (e.data.type === "__activate_edit_mode") panel.classList.add("show");
    if (e.data.type === "__deactivate_edit_mode") panel.classList.remove("show");
  });
  window.parent.postMessage({type: "__edit_mode_available"}, "*");
})();
</script>
